name: release

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "e2e/**"
      - "**/*.md"
      - ".github/**"

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Bump patch version (package.json + tauri.conf.json)
        id: bump
        shell: bash
        run: |
          NEW=$(node -e "const fs=require('fs');const p=require('./package.json');const [a,b,c]=p.version.split('.').map(Number);const v=a+'.'+b+'.'+(c+1);p.version=v;fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n');const tp='./src-tauri/tauri.conf.json';const t=require(tp);t.version=v;fs.writeFileSync(tp,JSON.stringify(t,null,2)+'\n');console.log(v)")
          echo "version=$NEW" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        shell: bash
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "chore: release v${{ steps.bump.outputs.version }} [skip ci]"
          git push

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v${{ steps.bump.outputs.version }}
          releaseName: "planifie v${{ steps.bump.outputs.version }}"
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
